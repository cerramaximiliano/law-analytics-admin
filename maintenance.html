<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mantenimiento — Law Analytics</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0a0f1e;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 16px;
      padding: 56px 48px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 40px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg {
      width: 22px;
      height: 22px;
      fill: #fff;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.3px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(234, 179, 8, 0.12);
      border: 1px solid rgba(234, 179, 8, 0.3);
      color: #fbbf24;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 28px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #fbbf24;
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.85); }
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #f1f5f9;
      line-height: 1.25;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }

    p {
      font-size: 15px;
      color: #94a3b8;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .divider {
      height: 1px;
      background: #1e293b;
      margin-bottom: 28px;
    }

    .footer {
      font-size: 13px;
      color: #475569;
    }

    .footer a {
      color: #6366f1;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <span class="logo-text">Law Analytics</span>
    </div>

    <div class="status-badge">
      <span class="dot"></span>
      Mantenimiento en curso
    </div>

    <h1>Estamos trabajando<br>en el sistema</h1>

    <p>
      El panel de administración se encuentra temporalmente fuera de servicio
      por tareas de mantenimiento programado. Estaremos de vuelta en breve.
    </p>

    <div class="divider"></div>

    <div class="footer">
      ¿Consultas? <a href="mailto:soporte@lawanalytics.app">soporte@lawanalytics.app</a>
    </div>
  </div>
</body>
</html>
