  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0a0f1e;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 16px;
      padding: 56px 48px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
    }

    .logo img.favicon {
      width: 36px;
      height: 36px;
      object-fit: contain;
    }

    .logo-text {
      font-size: 22px;
      font-weight: 700;
      color: #1976d2;
      letter-spacing: -0.3px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(234, 179, 8, 0.12);
      border: 1px solid rgba(234, 179, 8, 0.3);
      color: #fbbf24;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 28px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #fbbf24;
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.85); }
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #f1f5f9;
      line-height: 1.25;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }

    p {
      font-size: 15px;
      color: #94a3b8;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .divider {
      height: 1px;
      background: #1e293b;
      margin-bottom: 28px;
    }

    .footer {
      font-size: 13px;
      color: #475569;
    }

    .footer a {
      color: #6366f1;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
